<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Download Apps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h1 class="h4 mb-0">Download Apps</h1>
                    </div>
                    <div class="card-body">
                        <div class="list-group" th:each="version : ${versions}">
                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                <div>
                                    <strong th:text="${version.version}"></strong> - <span th:text="${version.platform}"></span>
                                </div>
                                <div>
                                    <a th:href="@{/download/app/{id}(id=${version.id})}" class="btn btn-primary btn-sm me-2">Download App</a>
                                    <a th:if="${version.iconPath}" th:href="@{/download/icon/{id}(id=${version.id})}" class="btn btn-secondary btn-sm">Download Icon</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
